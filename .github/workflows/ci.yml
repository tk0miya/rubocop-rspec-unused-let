name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby-version }}

    strategy:
      matrix:
        # `required_ruby_version` is >= 2.7, but CI runs the full `rake ci`
        # against the committed Gemfile.lock, whose pinned dev dependencies
        # (e.g. steep/rbs and parallel) require Ruby >= 3.3.
        ruby-version: ["3.3", "3.4", "4.0"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run CI
        run: bundle exec rake ci
